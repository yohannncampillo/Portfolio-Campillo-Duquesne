<svg viewBox="0 0 100 100" width="500" height="500" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff9a8b" />
            <stop offset="100%" stop-color="#a855f7" />
        </linearGradient>
    </defs>
    
    <!-- Bouclier Cyber -->
    <path d="M50 5 L85 20 V50 C85 75 50 95 50 95 C50 95 15 75 15 50 V20 L50 5 Z" stroke="url(#logoGradient)" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
    
    <!-- Réseau en forme de 'Y' -->
    <path d="M35 35 L50 55 L65 35 M50 55 L50 75" stroke="url(#logoGradient)" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
    
    <!-- Noeuds du réseau -->
    <!-- Le remplissage (fill) utilise la couleur de fond de ton site pour un rendu parfait -->
    <circle cx="35" cy="35" r="4" fill="#0a0a10" stroke="url(#logoGradient)" stroke-width="3"/>
    <circle cx="65" cy="35" r="4" fill="#0a0a10" stroke="url(#logoGradient)" stroke-width="3"/>
    <circle cx="50" cy="55" r="4" fill="#0a0a10" stroke="url(#logoGradient)" stroke-width="3"/>
    <circle cx="50" cy="75" r="4" fill="url(#logoGradient)"/>
</svg>